<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 CHARADÃO - Resultado</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4c1d95, #000000, #831843);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .container {
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        /* Emoji resultado */
        .emoji-resultado {
            font-size: 5rem;
            margin-bottom: 16px;
            animation: entrar 0.5s ease forwards;
        }

        @keyframes entrar {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .titulo-resultado {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #ff00aa, 0 0 40px #ff00aa;
        }

        .subtitulo-resultado {
            font-size: 1rem;
            color: #c4b5fd;
            margin-bottom: 32px;
        }

        /* Card de score */
        .card-score {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            padding: 32px 28px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 24px;
        }

        .linha-score {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
            gap: 16px;
        }

        .bloco-score {
            text-align: left;
        }

        .bloco-score.direita {
            text-align: right;
        }

        .label-score {
            font-size: 0.7rem;
            color: #a78bfa;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .valor-score {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .valor-score.verde { color: #34d399; }

        .valor-score small {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.35);
            font-weight: 400;
        }

        /* Barra de progresso */
        .barra-wrapper {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .barra-fill {
            height: 10px;
            border-radius: 50px;
            background: linear-gradient(to right, #34d399, #ff00aa);
            transition: width 1s ease;
            width: 0%;
        }

        /* Frase motivacional */
        .frase-final {
            font-size: 0.95rem;
            color: #e9d5ff;
            line-height: 1.5;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            border-left: 3px solid #ff00aa;
            text-align: left;
        }

        /* Detalhes extras */
        .detalhes {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detalhe-item {
            text-align: center;
        }

        .detalhe-valor {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f59e0b;
        }

        .detalhe-label {
            font-size: 0.7rem;
            color: #a78bfa;
            margin-top: 2px;
        }

        /* Botões de ação */
        .acoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .linha-acoes {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.97); }

        .btn-ranking {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.3);
        }

        .btn-ranking:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(245, 158, 11, 0.4);
        }

        .btn-jogar-novamente {
            background: linear-gradient(135deg, #ff00aa, #c026d3);
            color: white;
            box-shadow: 0 6px 20px rgba(255, 0, 170, 0.3);
        }

        .btn-jogar-novamente:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(255, 0, 170, 0.4);
        }

        .btn-categorias {
            width: 100%;
            background: rgba(255, 255, 255, 0.09);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .btn-categorias:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn-inicio {
            background: none;
            border: none;
            color: #a78bfa;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s;
            width: 100%;
            text-align: center;
        }

        .btn-inicio:hover { color: #ff00aa; }

        /* Confetes */
        .confete {
            position: fixed;
            top: -50px;
            font-size: 1.8rem;
            pointer-events: none;
            z-index: 999;
            animation: cair linear forwards;
        }

        @keyframes cair {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Modal salvar ranking */
        .modal-fundo {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }

        .modal-fundo.ativo { display: flex; }

        .modal-box {
            background: linear-gradient(135deg, #1e1b4b, #4a044e);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            padding: 36px 28px;
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        .modal-box h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-box p {
            color: #c4b5fd;
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-score-destaque {
            font-size: 3rem;
            font-weight: 700;
            color: #f59e0b;
            margin-bottom: 24px;
        }

        .modal-botoes {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-confirmar-ranking {
            padding: 16px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-pular-ranking {
            padding: 14px;
            background: rgba(255, 255, 255, 0.08);
            color: #a78bfa;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Responsivo */
        @media (max-width: 380px) {
            .valor-score { font-size: 2.8rem; }
            .titulo-resultado { font-size: 1.9rem; }
            .emoji-resultado { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="emoji-resultado" id="emoji-resultado">🎉</div>
        <h1 class="titulo-resultado" id="titulo-resultado">Parabéns!</h1>
        <p class="subtitulo-resultado" id="subtitulo-resultado">Você arrasou no Charadão!</p>

        <!-- Card de score -->
        <div class="card-score">
            <div class="linha-score">
                <div class="bloco-score">
                    <p class="label-score">SEU SCORE</p>
                    <p class="valor-score" id="valor-score">0</p>
                </div>
                <div class="bloco-score direita">
                    <p class="label-score">ACERTOS</p>
                    <p class="valor-score verde" id="valor-acertos">
                        0 <small>/ 0</small>
                    </p>
                </div>
            </div>

            <div class="barra-wrapper">
                <div class="barra-fill" id="barra-fill"></div>
            </div>

            <p class="frase-final" id="frase-final"></p>

            <div class="detalhes">
                <div class="detalhe-item">
                    <p class="detalhe-valor" id="detalhe-porcentagem">0%</p>
                    <p class="detalhe-label">de acerto</p>
                </div>
                <div class="detalhe-item">
                    <p class="detalhe-valor" id="detalhe-categoria">—</p>
                    <p class="detalhe-label">categoria</p>
                </div>
                <div class="detalhe-item">
                    <p class="detalhe-valor" id="detalhe-pontos-por">50</p>
                    <p class="detalhe-label">pts por acerto</p>
                </div>
            </div>
        </div>

        <!-- Botões -->
        <div class="acoes">
            <div class="linha-acoes">
                <button class="btn btn-ranking" onclick="abrirModalRanking()">
                    🏆 Salvar no Ranking
                </button>
                <button class="btn btn-jogar-novamente" onclick="jogarNovamente()">
                    🔥 Jogar de novo
                </button>
            </div>

            <button class="btn btn-categorias" onclick="window.location.href='categorias.html'">
                📚 Escolher outra categoria
            </button>

            <button class="btn-inicio" onclick="window.location.href='principal.html'">
                ← Voltar para o início
            </button>
        </div>

    </div>

    <!-- Modal salvar no ranking -->
    <div class="modal-fundo" id="modal-ranking" onclick="fecharModalSeForaDoBox(event)">
        <div class="modal-box">
            <h2>🏆 Salvar no Ranking?</h2>
            <p id="modal-texto-ranking">Seu score será salvo no ranking dos colegas!</p>
            <div class="modal-score-destaque" id="modal-score-valor">0</div>
            <div class="modal-botoes">
                <button class="btn-confirmar-ranking" onclick="salvarNoRanking()">
                    ✅ Sim, salvar meu score!
                </button>
                <button class="btn-pular-ranking" onclick="fecharModalRanking()">
                    Agora não
                </button>
            </div>
        </div>
    </div>

    <script>
        // ── Ler dados do localStorage ──
        const pontos        = parseInt(localStorage.getItem('charadaoPontos'))  || 0;
        const acertos       = parseInt(localStorage.getItem('charadaoAcertos')) || 0;
        const total         = parseInt(localStorage.getItem('charadaoTotal'))   || 10;
        const nomeJogador   = localStorage.getItem('charadaoNome')              || 'Jogador';
        const nomeCategoria = localStorage.getItem('charadaoCategoriaNome')     || 'Geral';

        const porcentagem = Math.round((acertos / total) * 100);

        // ── Preencher tela ──
        window.onload = function () {
            if (!localStorage.getItem('charadaoNome')) {
                window.location.href = 'index.html';
                return;
            }

            // Score e acertos
            document.getElementById('valor-score').textContent    = pontos;
            document.getElementById('valor-acertos').innerHTML    = acertos + ' <small>/ ' + total + '</small>';
            document.getElementById('detalhe-porcentagem').textContent = porcentagem + '%';
            document.getElementById('detalhe-categoria').textContent   = nomeCategoria;
            document.getElementById('modal-score-valor').textContent   = pontos + ' pts';
            document.getElementById('modal-texto-ranking').textContent =
                nomeJogador + ', seu score de ' + pontos + ' pontos será salvo para todos verem!';

            // Barra de progresso (com delay para animação)
            setTimeout(() => {
                document.getElementById('barra-fill').style.width = porcentagem + '%';
            }, 300);

            // Emoji, título e frase baseados na porcentagem
            const emojiEl    = document.getElementById('emoji-resultado');
            const tituloEl   = document.getElementById('titulo-resultado');
            const subtituloEl = document.getElementById('subtitulo-resultado');
            const fraseEl    = document.getElementById('frase-final');

            if (porcentagem === 100) {
                emojiEl.textContent     = '👑';
                tituloEl.textContent    = 'PERFEITO!';
                subtituloEl.textContent = 'Você acertou TUDO! Inacreditável!';
                fraseEl.textContent     = '100% de acerto! Você é o verdadeiro REI do Charadão. Seus colegas vão te idolatrar! 🔥';
                soltarConfetes(30);
            } else if (porcentagem >= 80) {
                emojiEl.textContent     = '🔥';
                tituloEl.textContent    = 'Arrasou!';
                subtituloEl.textContent = 'Você mandou muito bem!';
                fraseEl.textContent     = 'Quase perfeito! Mais uma rodada e você chega lá. Seus colegas vão ter dificuldade em te vencer!';
                soltarConfetes(20);
            } else if (porcentagem >= 60) {
                emojiEl.textContent     = '😎';
                tituloEl.textContent    = 'Mandou bem!';
                subtituloEl.textContent = 'Resultado acima da média!';
                fraseEl.textContent     = 'Bom desempenho! Você tem potencial pra chegar no topo. Tenta de novo e supera esse score!';
                soltarConfetes(10);
            } else if (porcentagem >= 40) {
                emojiEl.textContent     = '🤔';
                tituloEl.textContent    = 'Quase lá!';
                subtituloEl.textContent = 'Dá pra melhorar um pouco mais!';
                fraseEl.textContent     = 'Não foi dessa vez, mas você tá no caminho! Tenta uma categoria diferente e aumenta seu score.';
            } else {
                emojiEl.textContent     = '😂';
                tituloEl.textContent    = 'Foi divertido!';
                subtituloEl.textContent = 'A prática leva à perfeição!';
                fraseEl.textContent     = 'Todo mundo começa de algum lugar! Tenta o modo rápido pra pegar o ritmo e depois volta pra vencer!';
            }
        };

        // ── Confetes ──
        function soltarConfetes(quantidade) {
            const emojis = ['🎉', '✨', '🔥', '💥', '⭐', '🎊'];
            for (let i = 0; i < quantidade; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'confete';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = (Math.random() * 100) + 'vw';
                    el.style.fontSize = (1.4 + Math.random() * 1.2) + 'rem';
                    el.style.animationDuration = (2.5 + Math.random() * 2) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 5000);
                }, i * 80);
            }
        }

        // ── Ranking ──
        function abrirModalRanking() {
            document.getElementById('modal-ranking').classList.add('ativo');
        }

        function fecharModalRanking() {
            document.getElementById('modal-ranking').classList.remove('ativo');
        }

        function fecharModalSeForaDoBox(e) {
            if (e.target === document.getElementById('modal-ranking')) fecharModalRanking();
        }

        function salvarNoRanking() {
            const ranking = JSON.parse(localStorage.getItem('charadaoRanking')) || [];

            ranking.push({
                nome:      nomeJogador,
                pontos:    pontos,
                acertos:   acertos,
                total:     total,
                categoria: nomeCategoria,
                data:      new Date().toLocaleDateString('pt-BR')
            });

            // Ordena do maior para o menor e guarda só os top 20
            ranking.sort((a, b) => b.pontos - a.pontos);
            const top20 = ranking.slice(0, 20);
            localStorage.setItem('charadaoRanking', JSON.stringify(top20));

            fecharModalRanking();
            window.location.href = 'ranking.html';
        }

        // ── Jogar novamente na mesma categoria ──
        function jogarNovamente() {
            window.location.href = 'jogo.html';
        }
    </script>

</body>
</html>
