<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 CHARADÃO 🔥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4c1d95, #000000, #831843);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 32px;
            padding: 50px 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            text-align: center;
        }
        
        .neon {
            text-shadow: 0 0 25px #ff00aa,
                        0 0 45px #ff00aa;
        }
        
        input {
            width: 100%;
            padding: 18px 20px;
            margin: 25px 0;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-size: 1.1rem;
        }
        
        input::placeholder {
            color: #c4b5fd;
        }
        
        button {
            width: 100%;
            padding: 20px;
            font-size: 1.35rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(to right, #ff00aa, #c026d3);
            color: white;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(255, 0, 170, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="text-5xl font-bold mb-6 neon">🔥 CHARADÃO 🔥</h1>
        
        <p class="text-2xl mb-4">Bem-vindo!</p>
        <p class="text-lg mb-10 text-purple-200">Cadastre-se rapidinho para começar a brincadeira</p>
        
        <input type="text" id="nome" placeholder="Seu nome ou apelido" maxlength="20">
        
        <button onclick="iniciarCadastro()">ENTRAR NO CHARADÃO 🔥</button>
        
        <p class="text-xs text-purple-400 mt-10">Só precisamos do seu nome para o ranking</p>
    </div>

    <script>
        function iniciarCadastro() {
            const nome = document.getElementById("nome").value.trim();
            
            if (nome === "") {
                alert("Por favor, digite seu nome ou apelido!");
                return;
            }
            
            localStorage.setItem("charadaoNome", nome);
            alert(`Olá, ${nome}! 🎉 Vamos zoar com as charadas!`);
            window.location.href = "principal.html";
        }
    </script>
</body>
</html>
