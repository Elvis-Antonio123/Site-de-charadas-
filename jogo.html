<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 CHARADÃO - Jogando</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#4c1d95,#000000,#831843); color:white; min-height:100vh; display:flex; flex-direction:column; }
        .cabecalho { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; background:rgba(0,0,0,0.35); backdrop-filter:blur(10px); border-bottom:1px solid rgba(255,255,255,0.1); gap:10px; flex-shrink:0; }
        .btn-sair { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; font-family:'Poppins',sans-serif; font-size:0.82rem; font-weight:600; padding:8px 14px; border-radius:50px; cursor:pointer; transition:background 0.2s; flex-shrink:0; }
        .btn-sair:hover { background:rgba(255,255,255,0.18); }
        .info-centro { text-align:center; flex:1; min-width:0; }
        .nome-categoria { font-size:0.75rem; font-weight:700; color:#e879f9; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .barra-progresso-wrapper { margin-top:5px; background:rgba(255,255,255,0.1); border-radius:50px; height:5px; max-width:140px; margin-left:auto; margin-right:auto; }
        .barra-progresso-fill { height:5px; border-radius:50px; background:linear-gradient(to right,#ff00aa,#c026d3); transition:width 0.4s ease; }
        .info-pontos { text-align:right; flex-shrink:0; }
        .label-pontos { font-size:0.62rem; color:#a78bfa; letter-spacing:0.5px; }
        .valor-pontos { font-size:1.55rem; font-weight:700; line-height:1; }
        .area-jogo { flex:1; display:flex; align-items:center; justify-content:center; padding:20px 18px; }
        .conteudo-jogo { width:100%; max-width:560px; }
        .indicador-charada { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
        .numero-charada { font-size:0.75rem; color:#f59e0b; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; }
        .btn-favoritar { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:50px; padding:6px 14px; color:rgba(255,255,255,0.5); font-family:'Poppins',sans-serif; font-size:0.8rem; cursor:pointer; transition:all 0.25s; }
        .btn-favoritar:hover { border-color:#ff00aa; color:#ff00aa; }
        .btn-favoritar.favoritado { background:rgba(255,0,170,0.15); border-color:#ff00aa; color:#ff00aa; }
        .card-charada { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:28px; padding:32px 26px; backdrop-filter:blur(12px); box-shadow:0 20px 40px rgba(0,0,0,0.4); margin-bottom:20px; animation:flutuar 4s ease-in-out infinite; }
        @keyframes flutuar { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
        .topo-card { text-align:center; margin-bottom:14px; }
        .badge-dificuldade { display:inline-block; font-size:0.65rem; font-weight:700; padding:3px 12px; border-radius:50px; letter-spacing:0.5px; }
        .badge-dificuldade.media   { background:rgba(245,158,11,0.2); color:#f59e0b; border:1px solid rgba(245,158,11,0.35); }
        .badge-dificuldade.dificil { background:rgba(239,68,68,0.2);  color:#f87171; border:1px solid rgba(239,68,68,0.35); }
        .badge-dificuldade.expert  { background:rgba(168,85,247,0.2); color:#c084fc; border:1px solid rgba(168,85,247,0.35); }
        .texto-pergunta { font-size:1.45rem; font-weight:600; line-height:1.5; text-align:center; min-height:110px; display:flex; align-items:center; justify-content:center; }
        @media (max-width:400px) { .texto-pergunta { font-size:1.18rem; } }
        .container-resposta { display:none; margin-top:24px; padding-top:22px; border-top:1px solid rgba(255,255,255,0.12); text-align:center; }
        .label-resposta { font-size:0.7rem; font-weight:700; color:#34d399; letter-spacing:1px; margin-bottom:8px; }
        .texto-resposta { font-size:1.25rem; font-weight:700; background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.28); border-radius:14px; padding:14px 18px; }
        .acoes { display:flex; flex-direction:column; gap:11px; }
        .btn-revelar { width:100%; padding:19px; background:linear-gradient(135deg,#ff00aa,#c026d3); color:white; border:none; border-radius:18px; font-family:'Poppins',sans-serif; font-size:1.05rem; font-weight:700; cursor:pointer; box-shadow:0 8px 24px rgba(255,0,170,0.35); transition:transform 0.2s,box-shadow 0.2s; }
        .btn-revelar:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(255,0,170,0.5); }
        .btn-revelar:active { transform:scale(0.97); }
        .acoes-resposta { display:none; grid-template-columns:1fr 1fr; gap:11px; }
        .btn-acertei { padding:17px; background:linear-gradient(135deg,#059669,#047857); color:white; border:none; border-radius:18px; font-family:'Poppins',sans-serif; font-size:0.98rem; font-weight:700; cursor:pointer; transition:transform 0.2s; }
        .btn-acertei:hover { transform:translateY(-2px); }
        .btn-acertei:active { transform:scale(0.97); }
        .btn-errei { padding:17px; background:linear-gradient(135deg,#dc2626,#b91c1c); color:white; border:none; border-radius:18px; font-family:'Poppins',sans-serif; font-size:0.98rem; font-weight:700; cursor:pointer; transition:transform 0.2s; }
        .btn-errei:hover { transform:translateY(-2px); }
        .btn-errei:active { transform:scale(0.97); }
        .btn-proxima { display:none; width:100%; padding:17px; background:rgba(255,255,255,0.09); color:white; border:1px solid rgba(255,255,255,0.22); border-radius:18px; font-family:'Poppins',sans-serif; font-size:0.98rem; font-weight:700; cursor:pointer; transition:background 0.2s,transform 0.2s; }
        .btn-proxima:hover { background:rgba(255,255,255,0.16); transform:translateY(-2px); }
        .btn-proxima:active { transform:scale(0.97); }
        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:rgba(30,0,60,0.95); border:1px solid rgba(255,0,170,0.4); color:white; padding:12px 24px; border-radius:50px; font-size:0.88rem; font-weight:600; transition:transform 0.3s ease; z-index:200; white-space:nowrap; }
        .toast.visivel { transform:translateX(-50%) translateY(0); }
        .confete { position:fixed; top:-50px; pointer-events:none; z-index:999; animation:cair linear forwards; }
        @keyframes cair { to { transform:translateY(110vh) rotate(720deg); opacity:0; } }
        .modal-fundo { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.78); align-items:center; justify-content:center; padding:20px; z-index:100; }
        .modal-fundo.ativo { display:flex; }
        .modal-box { background:linear-gradient(135deg,#1e1b4b,#4a044e); border:1px solid rgba(255,255,255,0.15); border-radius:28px; padding:34px 26px; max-width:340px; width:100%; text-align:center; }
        .modal-box h2 { font-size:1.35rem; margin-bottom:10px; }
        .modal-box p  { color:#c4b5fd; font-size:0.9rem; margin-bottom:26px; line-height:1.5; }
        .modal-botoes { display:flex; gap:10px; }
        .btn-modal-cancelar { flex:1; padding:14px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:14px; font-family:'Poppins',sans-serif; font-size:0.9rem; font-weight:600; cursor:pointer; }
        .btn-modal-sair { flex:1; padding:14px; background:linear-gradient(135deg,#dc2626,#b91c1c); color:white; border:none; border-radius:14px; font-family:'Poppins',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; }
        .btn-musica { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); color:white; font-family:'Poppins',sans-serif; font-size:0.75rem; font-weight:600; padding:7px 13px; border-radius:50px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:5px; flex-shrink:0; }
        .btn-musica:hover { background:rgba(255,255,255,0.16); }
        .btn-musica.mutado { border-color:rgba(239,68,68,0.4); color:#fca5a5; background:rgba(239,68,68,0.1); }
        @keyframes pulsar-nota { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
        .btn-musica.tocando span { animation:pulsar-nota 1.4s ease-in-out infinite; display:inline-block; }

        /* ── Temporizador ── */
        .temporizador-wrap { margin-bottom:18px; }
        .tempo-topo { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .tempo-label { font-size:0.7rem; color:#a78bfa; font-weight:600; letter-spacing:0.5px; }
        .tempo-numero { font-size:1.1rem; font-weight:700; color:#a78bfa; transition:color 0.3s; min-width:36px; text-align:right; }
        .tempo-numero.urgente { color:#ef4444; }
        .barra-tempo-wrap { background:rgba(255,255,255,0.1); border-radius:50px; height:7px; overflow:hidden; }
        .barra-tempo-fill { height:7px; border-radius:50px; background:linear-gradient(to right,#a78bfa,#e879f9); transition:width 0.9s linear, background 0.4s; width:100%; }
        .barra-tempo-fill.urgente { background:linear-gradient(to right,#ef4444,#f97316); }
        @keyframes piscar-barra { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .barra-tempo-fill.piscando { animation:piscar-barra 0.4s ease-in-out infinite; }

        /* ── Opções de resposta ── */
        .grid-opcoes { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .btn-opcao { padding:14px 10px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); border-radius:16px; color:white; font-family:'Poppins',sans-serif; font-size:0.88rem; font-weight:600; cursor:pointer; transition:all 0.2s; text-align:center; line-height:1.35; min-height:62px; display:flex; align-items:center; justify-content:center; }
        .btn-opcao:hover:not(:disabled) { background:rgba(255,255,255,0.16); transform:translateY(-2px); border-color:rgba(255,255,255,0.35); }
        .btn-opcao:active:not(:disabled) { transform:scale(0.97); }
        .btn-opcao:disabled { cursor:default; }
        .btn-opcao.correta  { background:rgba(5,150,105,0.3)!important;  border-color:#34d399!important; color:#6ee7b7!important;  animation:pulsar-certa 0.4s ease; }
        .btn-opcao.errada   { background:rgba(220,38,38,0.25)!important; border-color:#f87171!important; color:#fca5a5!important; }
        .btn-opcao.revelada { background:rgba(5,150,105,0.15)!important; border-color:#34d399!important; color:#6ee7b7!important; }
        @keyframes pulsar-certa { 0%{transform:scale(1)} 50%{transform:scale(1.04)} 100%{transform:scale(1)} }
        @media (max-width:400px) { .btn-opcao { font-size:0.8rem; padding:11px 8px; min-height:54px; } }
    </style>
</head>
<body>
    <div class="cabecalho">
        <button class="btn-sair" onclick="confirmarSaida()">← Sair</button>
        <div class="info-centro">
            <p class="nome-categoria" id="nome-categoria">Carregando...</p>
            <div class="barra-progresso-wrapper">
                <div class="barra-progresso-fill" id="barra-progresso" style="width:0%"></div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
            <button class="btn-musica tocando" id="btn-musica" onclick="toggleMusica()">
                <span>🎵</span> Lo-fi
            </button>
            <div class="info-pontos">
                <p class="label-pontos">PONTOS</p>
                <p class="valor-pontos" id="valor-pontos">0</p>
            </div>
        </div>
    </div>
    <div class="area-jogo">
        <div class="conteudo-jogo">
            <div class="indicador-charada">
                <p class="numero-charada" id="numero-charada">🤔 CHARADA 1 DE 10</p>
                <button class="btn-favoritar" id="btn-favoritar" onclick="toggleFavorito()">♡ Favoritar</button>
            </div>

            <!-- Temporizador -->
            <div class="temporizador-wrap">
                <div class="tempo-topo">
                    <span class="tempo-label">⏱ TEMPO</span>
                    <span class="tempo-numero" id="tempo-numero">30</span>
                </div>
                <div class="barra-tempo-wrap">
                    <div class="barra-tempo-fill" id="barra-tempo"></div>
                </div>
            </div>

            <div class="card-charada">
                <div class="topo-card">
                    <span class="badge-dificuldade media" id="badge-dificuldade">⚡ MÉDIA</span>
                </div>
                <p class="texto-pergunta" id="texto-pergunta">Carregando...</p>
            </div>

            <!-- Grid de 4 opções -->
            <div class="grid-opcoes" id="grid-opcoes"></div>

            <!-- Botão próxima (aparece após responder) -->
            <button class="btn-proxima" id="btn-proxima" onclick="proximaCharada()" style="display:none;margin-top:12px;">
                PRÓXIMA CHARADA →
            </button>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="modal-fundo" id="modal-sair" onclick="fecharModalSeForaDoBox(event)">
        <div class="modal-box">
            <h2>😬 Tem certeza?</h2>
            <p>Se sair agora, o progresso desta partida será perdido!</p>
            <div class="modal-botoes">
                <button class="btn-modal-cancelar" onclick="fecharModalSair()">Continuar jogando</button>
                <button class="btn-modal-sair"     onclick="sairDoJogo()">Sair</button>
            </div>
        </div>
    </div>
    <script>
    var charadasDB = {
        classicas: [
            {p:"Sou filha do mar e da montanha, mas nunca vi nenhum dos dois. O que sou?",r:"O sal",d:"dificil"},
            {p:"Tenho cidades sem casas, florestas sem arvores e agua sem peixe. O que sou?",r:"Um mapa",d:"expert"},
            {p:"Posso ser quebrado sem ser tocado, dado sem ser tido e mantido sem ser guardado. O que sou?",r:"Uma promessa",d:"expert"},
            {p:"Quanto mais ela seca, mais molhada fica. O que e?",r:"A toalha",d:"media"},
            {p:"Entro pela porta, saio pela janela e nunca toco no chao. O que sou?",r:"A luz do sol",d:"expert"},
            {p:"Sou sempre ontem para amanha e sempre amanha para ontem. Nunca sou hoje. O que sou?",r:"O presente",d:"expert"},
            {p:"Corro mais rapido que qualquer cavalo e ainda assim nunca saio do lugar. O que sou?",r:"O pensamento",d:"expert"},

        animais: [

        comida: [

            {p:"Sou fermentado, bolhoso e deixo o pao mais leve, mas sozinho nao como. O que sou?",r:"O fermento ou levedo",d:"dificil"},
            {p:"Sou o unico alimento que nunca estraga — ja fui encontrado nos tumulos dos faraos ainda comestivel. O que sou?",r:"O mel",d:"expert"},
            {p:"Sou amargo, negro e acordo metade do mundo toda manha. O que sou?",r:"O cafe",d:"media"},
            {p:"Sou o fruto mais consumido do mundo mas cientificamente sou uma baga, nao uma fruta comum. O que sou?",r:"A banana",d:"expert"},
            {p:"Vim da India, conquistei o mundo, mas ninguem me chama pelo meu nome verdadeiro — me chamam pelo meu efeito. O que sou?",r:"A pimenta",d:"expert"},

            {p:"Fui inventado para ser jogado fora depois de um unico uso, mas hoje duro seculos no planeta. O que sou?",r:"O plastico descartavel",d:"expert"},
            {p:"Tenho memoria sem ter cerebro, executo ordens sem ter vontade. O que sou?",r:"O computador",d:"dificil"},
            {p:"Estou sempre na frente de voce mas nunca consigo te ver. O que sou?",r:"A testa ou fronte",d:"dificil"},
            {p:"Sou um lugar onde todo mundo entra mas nunca fica. O que sou?",r:"A porta",d:"media"},
            {p:"Quanto mais tiram de mim, mais completo fico. O que sou?",r:"O molde ou negativo fotografico",d:"expert"},

        tecnologia: [

            {p:"Processo 200 bilhoes de e-mails por dia, mas 85% de mim e lixo. O que sou?",r:"O sistema de e-mail global ou spam",d:"expert"},
            {p:"Tenho mais de 1 bilhao de sites mas voce visita sempre os mesmos 5. O que sou?",r:"A World Wide Web ou internet",d:"dificil"},
            {p:"Sou o silencio entre os dados que faz a informacao fazer sentido. O que sou?",r:"O protocolo ou estrutura de dados",d:"expert"}
        ],
        reflexivas: [

    var charadasRodada=[],indiceAtual=0,pontuacao=0,acertos=0,totalCharadas=0,nomeCategoria='',categoriaKey='';

    window.onload=function(){
        var nome=localStorage.getItem('charadaoNome');
        if(!nome){window.location.href='index.html';return;}
        categoriaKey=localStorage.getItem('charadaoCategoria')||'rapido';
        nomeCategoria=localStorage.getItem('charadaoCategoriaNome')||'Modo Rapido';
        document.getElementById('nome-categoria').textContent=nomeCategoria;
        if(categoriaKey==='rapido'){
            var todas=[];
            Object.values(charadasDB).forEach(function(arr){todas=todas.concat(arr);});
            charadasRodada=embaralhar(todas).slice(0,15);
        } else {
            charadasRodada=embaralhar((charadasDB[categoriaKey]||[]).slice());
        }
        var customDB=JSON.parse(localStorage.getItem('charadaoCustom')||'{}');
        if(categoriaKey==='rapido'){
            var custom=[];
            Object.values(customDB).forEach(function(arr){custom=custom.concat(arr);});
            if(custom.length)charadasRodada=charadasRodada.concat(embaralhar(custom).slice(0,3));
        } else if(customDB[categoriaKey]&&customDB[categoriaKey].length){
            charadasRodada=charadasRodada.concat(customDB[categoriaKey]);
        }
        totalCharadas=charadasRodada.length;
        carregarCharada();
    };

    function carregarCharada(){
        if(indiceAtual>=totalCharadas){irParaResultado();return;}
        var c=charadasRodada[indiceAtual];
        var prog=Math.round((indiceAtual/totalCharadas)*100);
        document.getElementById('texto-pergunta').textContent=c.p;
        document.getElementById('numero-charada').textContent='Charada '+(indiceAtual+1)+' de '+totalCharadas;
        document.getElementById('barra-progresso').style.width=prog+'%';
        var badge=document.getElementById('badge-dificuldade');
        var dif=c.d||'media';
        var mapa={media:['MEDIA','media'],dificil:['DIFICIL','dificil'],expert:['EXPERT','expert']};
        badge.textContent=mapa[dif][0];
        badge.className='badge-dificuldade '+mapa[dif][1];
        atualizarBotaoFavoritar(c);
        document.getElementById('btn-proxima').style.display='none';
        gerarOpcoes(c);
        iniciarTemporizador();
    }

    // ── Gerar 4 opções (1 certa + 3 falsas) ──
    function gerarOpcoes(c){
        var todasRespostas=[];
        Object.values(charadasDB).forEach(function(arr){
            arr.forEach(function(item){ if(item.r!==c.r) todasRespostas.push(item.r); });
        });
        embaralhar(todasRespostas);
        var falsas=todasRespostas.slice(0,3);
        var opcoes=embaralhar([c.r].concat(falsas));
        var grid=document.getElementById('grid-opcoes');
        grid.innerHTML='';
        opcoes.forEach(function(op){
            var btn=document.createElement('button');
            btn.className='btn-opcao';
            btn.textContent=op;
            btn.onclick=function(){ selecionarOpcao(btn,op,c.r,c.d||'media'); };
            grid.appendChild(btn);
        });
    }

    // ── Selecionar opção ──
    function selecionarOpcao(btnClicado, escolha, correta, dif){
        pararTemporizador();
        var botoes=document.querySelectorAll('.btn-opcao');
        botoes.forEach(function(b){ b.disabled=true; });
        var acertou=(escolha===correta);
        if(acertou){
            btnClicado.classList.add('correta');
            var mult={media:1,dificil:1.5,expert:2};
            var ganho=Math.round(50*mult[dif]);
            pontuacao+=ganho; acertos++;
            document.getElementById('valor-pontos').textContent=pontuacao;
            pausarMusicaParaFeedback();
            tocarSomAcerto();
            soltarConfetes();
        } else {
            btnClicado.classList.add('errada');
            // Revelar a certa
            botoes.forEach(function(b){ if(b.textContent===correta) b.classList.add('revelada'); });
            pausarMusicaParaFeedback();
            tocarSomErro();
        }
        setTimeout(function(){
            document.getElementById('btn-proxima').style.display='block';
        }, 900);
    }

    function proximaCharada(){indiceAtual++;carregarCharada();}

    function irParaResultado(){
        pararTemporizador();
        pararMusica();
        localStorage.setItem('charadaoPontos',pontuacao);
        localStorage.setItem('charadaoAcertos',acertos);
        localStorage.setItem('charadaoTotal',totalCharadas);
        window.location.href='resultado.html';
    }

    // ── Temporizador ──
    var tempoRestante=30;
    var timerInterval=null;

    function iniciarTemporizador(){
        pararTemporizador();
        tempoRestante=30;
        atualizarUITempo();
        timerInterval=setInterval(function(){
            tempoRestante--;
            atualizarUITempo();
            if(tempoRestante<=5 && tempoRestante>0){
                tocarTick();
            }
            if(tempoRestante<=0){
                pararTemporizador();
                tempoEsgotado();
            }
        },1000);
    }

    function pararTemporizador(){
        if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
    }

    function atualizarUITempo(){
        var num=document.getElementById('tempo-numero');
        var barra=document.getElementById('barra-tempo');
        num.textContent=tempoRestante;
        barra.style.width=((tempoRestante/30)*100)+'%';
        var urgente=tempoRestante<=5;
        num.className='tempo-numero'+(urgente?' urgente':'');
        barra.className='barra-tempo-fill'+(urgente?' urgente piscando':'');
    }

    function tempoEsgotado(){
        var botoes=document.querySelectorAll('.btn-opcao');
        botoes.forEach(function(b){ b.disabled=true; });
        var c=charadasRodada[indiceAtual];
        botoes.forEach(function(b){ if(b.textContent===c.r) b.classList.add('revelada'); });
        pausarMusicaParaFeedback();
        tocarSomErro();
        mostrarToast('⏱ Tempo esgotado!');
        setTimeout(function(){ document.getElementById('btn-proxima').style.display='block'; },900);
    }

    function atualizarBotaoFavoritar(c){
        var favs=JSON.parse(localStorage.getItem('charadaoFavoritos')||'[]');
        var jaFav=favs.some(function(f){return f.p===c.p;});
        var btn=document.getElementById('btn-favoritar');
        btn.textContent=jaFav?'Favoritada':'Favoritar';
        btn.className='btn-favoritar'+(jaFav?' favoritado':'');
    }

    function toggleFavorito(){
        var c=charadasRodada[indiceAtual];
        var favs=JSON.parse(localStorage.getItem('charadaoFavoritos')||'[]');
        var idx=favs.findIndex(function(f){return f.p===c.p;});
        if(idx===-1){
            favs.push({p:c.p,r:c.r,d:c.d,cat:nomeCategoria});
            mostrarToast('Adicionada aos favoritos!');
        } else {
            favs.splice(idx,1);
            mostrarToast('Removida dos favoritos');
        }
        localStorage.setItem('charadaoFavoritos',JSON.stringify(favs));
        atualizarBotaoFavoritar(c);
    }

    var toastTimer=null;
    function mostrarToast(msg){
        var t=document.getElementById('toast');
        t.textContent=msg;t.classList.add('visivel');
        clearTimeout(toastTimer);
        toastTimer=setTimeout(function(){t.classList.remove('visivel');},2200);
    }

    function soltarConfetes(){
        var emojis=['*','!','o','@','#'];
        for(var i=0;i<14;i++){
            var el=document.createElement('div');
            el.className='confete';
            el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
            el.style.left=(Math.random()*100)+'vw';
            el.style.fontSize=(1.3+Math.random())+'rem';
            el.style.animationDuration=(2+Math.random()*2)+'s';
            el.style.animationDelay=(Math.random()*0.5)+'s';
            document.body.appendChild(el);
            setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},4500);
        }
    }

    // ── Sons de feedback ──
    function pausarMusicaParaFeedback(){
        if(!ctx||!masterGain) return;
        masterGain.gain.cancelScheduledValues(ctx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime+0.15);
    }

    function voltarMusica(){
        if(!ctx||!masterGain||!musicaAtiva) return;
        setTimeout(function(){
            if(masterGain) masterGain.gain.linearRampToValueAtTime(0.55, ctx.currentTime+0.6);
        }, 300);
    }

    function tocarSomAcerto(){
        if(!ctx) return;
        // Arpeijo ascendente alegre: C5 E5 G5 C6
        var notas=[523.25,659.25,783.99,1046.5];
        notas.forEach(function(freq,i){
            var osc=ctx.createOscillator();
            var env=ctx.createGain();
            osc.type='sine';
            osc.frequency.value=freq;
            var t=ctx.currentTime+i*0.1;
            env.gain.setValueAtTime(0,t);
            env.gain.linearRampToValueAtTime(0.35,t+0.02);
            env.gain.exponentialRampToValueAtTime(0.001,t+0.3);
            osc.connect(env); env.connect(ctx.destination);
            osc.start(t); osc.stop(t+0.32);
        });
        setTimeout(voltarMusica, 700);
    }

    function tocarSomErro(){
        if(!ctx) return;
        // Dois tons descendentes graves
        [[220,180],[180,140]].forEach(function(par,i){
            var osc=ctx.createOscillator();
            var env=ctx.createGain();
            osc.type='sawtooth';
            var t=ctx.currentTime+i*0.22;
            osc.frequency.setValueAtTime(par[0],t);
            osc.frequency.linearRampToValueAtTime(par[1],t+0.2);
            env.gain.setValueAtTime(0,t);
            env.gain.linearRampToValueAtTime(0.28,t+0.02);
            env.gain.exponentialRampToValueAtTime(0.001,t+0.22);
            // Filtro para soar menos agressivo
            var filtro=ctx.createBiquadFilter();
            filtro.type='lowpass'; filtro.frequency.value=900;
            osc.connect(filtro); filtro.connect(env); env.connect(ctx.destination);
            osc.start(t); osc.stop(t+0.24);
        });
        setTimeout(voltarMusica, 800);
    }

    function tocarTick(){
        if(!ctx) return;
        var osc=ctx.createOscillator();
        var env=ctx.createGain();
        osc.type='square';
        osc.frequency.value=880;
        var t=ctx.currentTime;
        env.gain.setValueAtTime(0,t);
        env.gain.linearRampToValueAtTime(0.12,t+0.008);
        env.gain.exponentialRampToValueAtTime(0.001,t+0.07);
        osc.connect(env); env.connect(ctx.destination);
        osc.start(t); osc.stop(t+0.08);
    }

    function confirmarSaida(){document.getElementById('modal-sair').classList.add('ativo');}
    function fecharModalSair(){document.getElementById('modal-sair').classList.remove('ativo');}
    function fecharModalSeForaDoBox(e){if(e.target===document.getElementById('modal-sair'))fecharModalSair();}
    function sairDoJogo(){window.location.href='categorias.html';}

    function embaralhar(arr){
        for(var i=arr.length-1;i>0;i--){
            var j=Math.floor(Math.random()*(i+1));
            var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;
        }
        return arr;
    }

    // ════════════════════════════════════════════════
    //   MOTOR DE ÁUDIO LO-FI — Web Audio API
    //   Inspirado em: Nujabes / Studio Ghibli Lo-fi
    //   Estrutura: batida de caixa+bumbo + baixo +
    //              melodia de piano suave + acordes pad
    // ════════════════════════════════════════════════
    var ctx = null;
    var masterGain = null;
    var musicaAtiva = true;
    var schedulerTimer = null;
    var tempoAtual = 0;
    var BPM = 75;                       // Lo-fi lento e relaxante
    var BEAT = 60 / BPM;                // duração de 1 batida em segundos
    var COMPASSO = BEAT * 4;            // 4 batidas por compasso
    var compassoAtual = 0;

    // Progressão de acordes Lo-fi (Am7 → Dm7 → G7 → Cmaj7)
    // Frequências das notas base de cada acorde
    var ACORDES = [
        [220.00, 261.63, 329.63, 392.00],  // Am7:  A3 C4 E4 G4
        [146.83, 174.61, 220.00, 261.63],  // Dm7:  D3 F3 A3 C4
        [196.00, 246.94, 293.66, 349.23],  // G7:   G3 B3 D4 F4
        [261.63, 329.63, 392.00, 493.88],  // Cmaj7:C4 E4 G4 B4
    ];

    // Melodia Lo-fi (índices das notas no acorde atual, -1 = silêncio)
    var MELODIA = [0,2,3,2, 1,3,-1,2, 0,1,2,-1, 3,2,1,0];

    function iniciarMusica() {
        try {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = ctx.createGain();
            masterGain.gain.setValueAtTime(0.0, ctx.currentTime);
            masterGain.gain.linearRampToValueAtTime(0.55, ctx.currentTime + 2.5);
            masterGain.connect(ctx.destination);
            tempoAtual = ctx.currentTime + 0.1;
            compassoAtual = 0;
            agendar();
        } catch(e) { console.warn('Web Audio API não suportada:', e); }
    }

    function agendar() {
        if (!ctx) return;
        // Agenda 2 compassos à frente para evitar gaps
        while (tempoAtual < ctx.currentTime + COMPASSO * 2) {
            tocarCompasso(tempoAtual, compassoAtual % ACORDES.length);
            tempoAtual += COMPASSO;
            compassoAtual++;
        }
        schedulerTimer = setTimeout(agendar, 200);
    }

    function tocarCompasso(t, idxAcorde) {
        var acorde = ACORDES[idxAcorde];

        // — PAD (acorde suave, como synth de fundo) —
        acorde.forEach(function(freq, i) {
            var osc = ctx.createOscillator();
            var env = ctx.createGain();
            var filtro = ctx.createBiquadFilter();
            filtro.type = 'lowpass';
            filtro.frequency.value = 800;
            osc.type = 'sine';
            osc.frequency.value = freq * 0.5;   // oitava abaixo para pad mais encorpado
            env.gain.setValueAtTime(0, t);
            env.gain.linearRampToValueAtTime(0.06, t + 0.15);
            env.gain.linearRampToValueAtTime(0.04, t + COMPASSO - 0.2);
            env.gain.linearRampToValueAtTime(0, t + COMPASSO);
            osc.connect(filtro); filtro.connect(env); env.connect(masterGain);
            osc.start(t); osc.stop(t + COMPASSO);
        });

        // — BAIXO (nota raiz do acorde, pulsando nas batidas 1 e 3) —
        [0, BEAT*2].forEach(function(offset) {
            var osc = ctx.createOscillator();
            var env = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = acorde[0] * 0.25; // 2 oitavas abaixo
            env.gain.setValueAtTime(0, t + offset);
            env.gain.linearRampToValueAtTime(0.28, t + offset + 0.03);
            env.gain.exponentialRampToValueAtTime(0.001, t + offset + BEAT * 1.8);
            osc.connect(env); env.connect(masterGain);
            osc.start(t + offset); osc.stop(t + offset + BEAT * 1.9);
        });

        // — MELODIA DE PIANO (nota a cada semibatida) —
        for (var step = 0; step < 16; step++) {
            var idxMel = (compassoAtual * 16 + step) % MELODIA.length;
            var grau   = MELODIA[idxMel];
            if (grau < 0) continue;
            var freqMel = acorde[grau % acorde.length] * (grau >= acorde.length ? 2 : 1);
            var tMel    = t + step * (BEAT / 4);
            tocarNota(freqMel, tMel, BEAT * 0.35, 0.09);
        }

        // — BUMBO (kick) — batidas 1 e 3 —
        [0, BEAT*2].forEach(function(offset) { tocarKick(t + offset); });

        // — CAIXA (snare) — batidas 2 e 4 —
        [BEAT, BEAT*3].forEach(function(offset) { tocarSnare(t + offset); });

        // — HI-HAT fechado — a cada semibatida —
        for (var h = 0; h < 8; h++) {
            var vel = (h % 2 === 0) ? 0.06 : 0.03;
            tocarHihat(t + h * (BEAT / 2), vel);
        }
    }

    function tocarNota(freq, t, dur, vol) {
        var osc  = ctx.createOscillator();
        var env  = ctx.createGain();
        var dist = ctx.createWaveShaper();  // leve distorção de fita Lo-fi
        dist.curve = (function(){
            var c = new Float32Array(256);
            for(var i=0;i<256;i++){var x=i*2/256-1;c[i]=x*(Math.abs(x)+0.3)/(Math.abs(x)*1.3+0.3);}
            return c;
        })();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        // Leve detune aleatório — sensação de piano "desafinado" Lo-fi
        osc.detune.value = (Math.random() - 0.5) * 18;
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(vol, t + 0.02);
        env.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(dist); dist.connect(env); env.connect(masterGain);
        osc.start(t); osc.stop(t + dur + 0.05);
    }

    function tocarKick(t) {
        var osc = ctx.createOscillator();
        var env = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(160, t);
        osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
        env.gain.setValueAtTime(0.5, t);
        env.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.connect(env); env.connect(masterGain);
        osc.start(t); osc.stop(t + 0.26);
    }

    function tocarSnare(t) {
        // Ruído branco filtrado = som de caixa
        var buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        var src    = ctx.createBufferSource();
        var filtro = ctx.createBiquadFilter();
        var env    = ctx.createGain();
        filtro.type = 'highpass';
        filtro.frequency.value = 1800;
        src.buffer = buf;
        env.gain.setValueAtTime(0.18, t);
        env.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
        src.connect(filtro); filtro.connect(env); env.connect(masterGain);
        src.start(t); src.stop(t + 0.15);
    }

    function tocarHihat(t, vol) {
        var buf  = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        var src    = ctx.createBufferSource();
        var filtro = ctx.createBiquadFilter();
        var env    = ctx.createGain();
        filtro.type = 'highpass';
        filtro.frequency.value = 8000;
        src.buffer = buf;
        env.gain.setValueAtTime(vol, t);
        env.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        src.connect(filtro); filtro.connect(env); env.connect(masterGain);
        src.start(t); src.stop(t + 0.05);
    }

    function pararMusica() {
        if (schedulerTimer) clearTimeout(schedulerTimer);
        if (masterGain) {
            masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
        }
        setTimeout(function() {
            if (ctx) { try { ctx.close(); } catch(e){} ctx = null; }
        }, 600);
    }

    function toggleMusica() {
        var btn = document.getElementById('btn-musica');
        if (musicaAtiva) {
            // Silenciar
            musicaAtiva = false;
            if (masterGain) masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
            btn.className = 'btn-musica mutado';
            btn.innerHTML = '<span>🔇</span> Mudo';
        } else {
            // Reativar
            musicaAtiva = true;
            if (!ctx) {
                iniciarMusica();
            } else {
                masterGain.gain.linearRampToValueAtTime(0.55, ctx.currentTime + 0.5);
            }
            btn.className = 'btn-musica tocando';
            btn.innerHTML = '<span>🎵</span> Lo-fi';
        }
    }

    // Parar música quando sair do jogo
    var _sairOriginal = sairDoJogo;
    sairDoJogo = function() { pararMusica(); setTimeout(_sairOriginal, 300); };

    // Iniciar música assim que o utilizador interage (política dos navegadores)
    document.addEventListener('click', function iniciarNoPrimeiroClick() {
        if (musicaAtiva && !ctx) iniciarMusica();
        document.removeEventListener('click', iniciarNoPrimeiroClick);
    }, { once: true });

    // Também tenta iniciar automaticamente (funciona em alguns navegadores)
    window.addEventListener('load', function() {
        setTimeout(function() { if (musicaAtiva && !ctx) iniciarMusica(); }, 400);
    });
    </script>
</body>
