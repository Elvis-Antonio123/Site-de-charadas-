<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 CHARADÃO - Categorias</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4c1d95, #000000, #831843);
            color: white;
            min-height: 100vh;
            padding: 0 0 40px 0;
        }

        /* Cabeçalho */
        .cabecalho {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .btn-voltar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-voltar:hover { background: rgba(255, 255, 255, 0.18); }

        .cabecalho-titulo {
            text-align: center;
        }

        .cabecalho-titulo h1 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .cabecalho-titulo p {
            font-size: 0.75rem;
            color: #a78bfa;
            margin-top: 2px;
        }

        .espaco-direita { width: 90px; }

        /* Conteúdo */
        .conteudo {
            max-width: 700px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .titulo-secao {
            font-size: 1rem;
            color: #a78bfa;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Grid de categorias */
        .grade-categorias {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (min-width: 500px) {
            .grade-categorias {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 680px) {
            .grade-categorias {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Card de categoria */
        .card-categoria {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 24px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card-categoria:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
        }

        .card-categoria:active { transform: scale(0.96); }

        /* Destaque especial para Animes */
        .card-categoria.destaque {
            border-color: rgba(255, 160, 0, 0.5);
            background: rgba(255, 160, 0, 0.08);
        }

        .card-categoria.destaque:hover {
            background: rgba(255, 160, 0, 0.15);
            box-shadow: 0 10px 28px rgba(255, 160, 0, 0.2);
        }

        .badge-novo {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #ff00aa, #c026d3);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 50px;
            letter-spacing: 0.5px;
        }

        .badge-quente {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 50px;
            letter-spacing: 0.5px;
        }

        .categoria-emoji {
            font-size: 2.4rem;
            margin-bottom: 10px;
            display: block;
        }

        .categoria-nome {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .categoria-qtd {
            font-size: 0.72rem;
            color: #a78bfa;
        }

        .card-categoria.destaque .categoria-qtd {
            color: #fbbf24;
        }

        /* Botão jogar tudo */
        .btn-jogar-tudo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #ff00aa, #c026d3);
            color: white;
            border: none;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 0, 170, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-jogar-tudo:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 0, 170, 0.5);
        }

        .btn-jogar-tudo:active { transform: scale(0.97); }

        /* Responsivo pequeno */
        @media (max-width: 360px) {
            .categoria-emoji { font-size: 2rem; }
            .categoria-nome { font-size: 0.82rem; }
            .card-categoria { padding: 18px 10px; }
        }
    </style>
</head>
<body>

    <!-- Cabeçalho -->
    <div class="cabecalho">
        <button class="btn-voltar" onclick="window.location.href='principal.html'">
            ← Voltar
        </button>
        <div class="cabecalho-titulo">
            <h1>Categorias 📚</h1>
            <p>Escolha onde quer se aventurar</p>
        </div>
        <div class="espaco-direita"></div>
    </div>

    <!-- Conteúdo -->
    <div class="conteudo">

        <p class="titulo-secao">12 categorias disponíveis • Toque para jogar</p>

        <div class="grade-categorias" id="grade-categorias">
            <!-- Preenchido pelo JavaScript -->
        </div>

        <!-- Botão jogar tudo -->
        <button class="btn-jogar-tudo" onclick="irParaJogo('rapido', 'Modo Rápido')">
            ⚡ JOGAR COM TODAS AS CATEGORIAS
        </button>

    </div>

    <script>
        // ── Definição das categorias ──
        const categorias = [
            { key: 'classicas',    nome: 'Clássicas',      emoji: '🧠', qtd: 10,  badge: null },
            { key: 'animais',      nome: 'Animais',         emoji: '🦁', qtd: 10,  badge: null },
            { key: 'comida',       nome: 'Comida',          emoji: '🍕', qtd: 10,  badge: null },
            { key: 'objetos',      nome: 'Objetos',         emoji: '📦', qtd: 10,  badge: null },
            { key: 'tecnologia',   nome: 'Tecnologia',      emoji: '💻', qtd: 10,  badge: null },
            { key: 'reflexivas',   nome: 'Reflexivas',      emoji: '🤔', qtd: 10,  badge: null },
            { key: 'engracadas',   nome: 'Engraçadas',      emoji: '😂', qtd: 10,  badge: null },
            { key: 'natureza',     nome: 'Natureza',        emoji: '🌳', qtd: 10,  badge: null },
            { key: 'musica',       nome: 'Música',          emoji: '🎵', qtd: 10,  badge: null },
            { key: 'cinema',       nome: 'Cinema & Séries', emoji: '🎬', qtd: 10,  badge: null },
            { key: 'espaco',       nome: 'Espaço',          emoji: '🌌', qtd: 15,  badge: null },
            { key: 'programacao',  nome: 'Programação',     emoji: '👨‍💻', qtd: 15,  badge: 'novo' },
            { key: 'animes',       nome: 'Animes',          emoji: '⛩️', qtd: 20,  badge: 'quente', destaque: true },
        ];

        // ── Renderizar cards ──
        const grade = document.getElementById('grade-categorias');

        categorias.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'card-categoria' + (cat.destaque ? ' destaque' : '');
            div.onclick = () => irParaJogo(cat.key, cat.nome);

            let badgeHTML = '';
            if (cat.badge === 'novo') badgeHTML = '<span class="badge-novo">NOVO</span>';
            if (cat.badge === 'quente') badgeHTML = '<span class="badge-quente">🔥 TOP</span>';

            div.innerHTML = `
                ${badgeHTML}
                <span class="categoria-emoji">${cat.emoji}</span>
                <p class="categoria-nome">${cat.nome}</p>
                <p class="categoria-qtd">${cat.qtd} charadas</p>
            `;

            grade.appendChild(div);
        });

        // ── Navegação ──
        function irParaJogo(categoria, nome) {
            localStorage.setItem('charadaoCategoria', categoria);
            localStorage.setItem('charadaoCategoriaNome', nome);
            window.location.href = 'jogo.html';
        }

        // ── Verificar login ──
        window.onload = function () {
            const nome = localStorage.getItem('charadaoNome');
            if (!nome) window.location.href = 'index.html';
        };
    </script>

</body>
</html>
